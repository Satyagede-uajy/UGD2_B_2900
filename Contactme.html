<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Me - Portofolio Saya</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Stylesheet.css" />
</head>

<body>
    <main class="hero">
        <section class="sisi_kiri">
            <a href="index.html" class="logo-link">
                <div class="logo-box">
                    <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" alt="Logo Rumah" class="ikon_rumah">
                </div>
            </a>
            <div class="main-content">
                <h1 class="nama">Contact Me</h1>
                <p class="role">Silakan isi formulir di sebelah kanan untuk menghubungi saya. Saya akan membalas pesan Anda secepat mungkin.</p>
            </div>
        </section>

        <section class="sisi_kanan">
            <nav class="navigasi_bar">
                <a href="aboutme.html">ABOUT ME</a>
                <a href="skill.html">SKILLS</a>
                <a href="portofolio.html">PORTFOLIO</a>
                <a href="contactme.html" class="contact-tombol">CONTACT ME</a>
            </nav>

            <div class="content-container ">
                <div class="efek-kaca ">
                    <h2 style="font-size: 28px; margin-bottom: 25px; color: #fff; ">SEND MESSAGE</h2>

                    <form class="form-contact ">
                        <div class="input-group ">
                            <label class="input-label ">Enter your name*</label>
                            <input type="text " required>
                        </div>

                        <div class="input-group ">
                            <label class="input-label ">Enter your email*</label>
                            <input type="email " required>
                        </div>

                        <div class="input-group ">
                            <label class="input-label ">Phone number</label>
                            <input type="tel ">
                        </div>

                        <div class="input-group ">
                            <label class="input-label ">Your message*</label>
                            <textarea rows="4 " required></textarea>
                        </div>

                        <button type="submit " class="submit-btn ">SUBMIT</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
